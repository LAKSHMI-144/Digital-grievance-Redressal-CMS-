<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit | G-Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-6 flex justify-center">
    <div class="glass-panel w-full max-w-2xl p-10 mt-10">
        <h2 class="text-3xl font-bold mb-8">File a Complaint</h2>
        <form id="complaintForm" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="Lakshmi R">
                </div>
                <div>
                    <label>Category</label>
                    <select id="category">
                        <option>Hostel</option>
                        <option>Academic</option>
                        <option>Infrastructure</option>
                    </select>
                </div>
            </div>
            <div>
                <label>Email</label>
                <input type="email" id="email" required placeholder="llakshmi@gmail.com">
            </div>
            <div>
                <label>Description</label>
                <textarea id="desc" rows="3" placeholder="Type your issue..."></textarea>
            </div>
            <div>
                <label>Evidence (Photo)</label>
                <input type="file" id="imageInput" accept="image/*" class="border-dashed border-2">
                <img id="imagePreview" class="hidden mt-4 w-20 h-20 rounded object-cover border">
            </div>
            <button type="submit" class="btn-3d w-full">Send Grievance</button>
        </form>
        <div id="successCard" class="hidden mt-6 p-6 bg-indigo-500/10 rounded-xl text-center">
            <p class="text-emerald-400 font-bold">Submitted! ID: <span id="idDisplay" class="text-white"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
