<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track | G-Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex justify-center p-6">
    <div class="glass-panel w-full max-w-md p-10 mt-20 text-center">
        <h2 class="text-2xl font-bold mb-6">Track Status</h2>
        <input type="text" id="trackID" placeholder="Enter ID (e.g. GRV-1234)" class="mb-4">
        <button onclick="trackStatus()" class="btn-3d w-full">Check Progress</button>
        <div id="statusResult" class="hidden mt-8 p-4 border-t border-white/10">
            <p class="text-slate-400 text-xs uppercase">Current Status</p>
            <div id="statusBadge" class="text-2xl font-black mt-2">PENDING</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
