<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Department Login | GrievanceHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden bg-slate-950">
    <div class="absolute bottom-[10%] -left-[10%] w-[40vw] h-[40vw] rounded-full bg-orange-600/10 blur-[100px] animate-blob mix-blend-screen"></div>

    <div class="glass-card border-orange-500/20 w-full max-w-md p-10 rounded-3xl relative z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-orange-400 to-red-500 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-500/30">
                <i class="fa-solid fa-briefcase text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold">Department Access</h1>
            <p class="text-slate-400 text-sm mt-2">Manage assigned grievances</p>
        </div>

        <form id="deptLoginForm" class="space-y-5">
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Staff Email</label>
                <input type="email" id="email" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500/50 transition-colors" placeholder="staff@university.edu">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Department Unit</label>
                <select id="deptSelect" class="w-full mt-1 bg-slate-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-orange-500/50 appearance-none">
                    <option value="Academic">Academic</option>
                    <option value="Hostel">Hostel</option>
                    <option value="Infrastructure">Infrastructure</option>
                    <option value="Maintenance">Maintenance</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Password</label>
                <input type="password" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500/50 transition-colors" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full px-6 py-3 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-xl transition-all shadow-[0_0_20px_rgba(234,88,12,0.3)] hover:shadow-[0_0_30px_rgba(234,88,12,0.5)] active:scale-95 mt-4">Login to Department</button>
        </form>

        <div class="mt-8 text-center pt-6">
            <a href="../index.html" class="inline-block text-xs text-orange-400 hover:text-orange-300">Return Home</a>
        </div>
    </div>

    <script src="../assets/script.js"></script>
    <script>
        handleLogin('deptLoginForm', 'department', 'department-dashboard.html');
    </script>
</body>
</html>
