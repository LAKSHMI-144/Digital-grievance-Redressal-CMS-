<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | GrievanceHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="bg-slate-950 text-white font-inter h-screen overflow-hidden flex selection:bg-emerald-500/30">

    <!-- Sidebar -->
    <aside class="w-64 glass-panel border-r border-white/5 flex flex-col transition-all duration-300 relative z-20">
        <div class="p-6 border-b border-white/5 flex flex-col justify-center">
            <div class="w-10 h-10 rounded-xl bg-emerald-600 flex items-center justify-center shadow-lg shadow-emerald-600/30 mb-3"><i class="fa-solid fa-shield-halved text-white"></i></div>
            <h1 class="font-bold text-lg tracking-tight">Admin<span class="text-emerald-400">Pro</span></h1>
            <p class="text-xs text-slate-500 mt-1">Grievance Management</p>
        </div>

        <nav class="flex-1 p-4 flex flex-col gap-2">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-4 mb-2 pl-3">Menu</p>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-emerald-500/10 text-emerald-400 rounded-xl font-medium border border-emerald-500/20 transition-all">
                <i class="fa-solid fa-border-all w-5 text-center"></i> Overview
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl font-medium transition-all">
                <i class="fa-solid fa-users w-5 text-center"></i> Accounts
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl font-medium transition-all">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i> Reports
            </a>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button onclick="logout()" class="flex items-center justify-center gap-2 w-full py-2.5 bg-white/5 hover:bg-red-500/20 hover:text-red-400 text-slate-300 rounded-xl font-medium transition-all text-sm border border-white/5">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 glass-header border-b border-white/5 px-8 flex items-center justify-between z-10">
            <h2 class="text-xl font-bold text-slate-200">System <span class="text-white">Overview</span></h2>
            <div class="flex flex-col items-end">
                <p class="text-sm font-bold text-white">Super Admin</p>
                <div class="flex items-center gap-2 text-xs text-emerald-400"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Online</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card rounded-2xl p-6 border-emerald-500/20">
                    <p class="text-sm text-slate-400 font-medium tracking-wide">Total Complaints</p>
                    <h3 class="text-4xl font-bold mt-2" id="statTotal">--</h3>
                </div>
                <div class="glass-card rounded-2xl p-6 border-orange-500/20">
                    <p class="text-sm text-slate-400 font-medium tracking-wide">Unassigned</p>
                    <h3 class="text-4xl font-bold mt-2 text-orange-400" id="statUnassigned">--</h3>
                </div>
                <div class="glass-card rounded-2xl p-6 border-indigo-500/20">
                    <p class="text-sm text-slate-400 font-medium tracking-wide">Resolved Fully</p>
                    <h3 class="text-4xl font-bold mt-2 text-indigo-400" id="statResolved">--</h3>
                </div>
            </div>

            <!-- Main Table Panel -->
            <div class="glass-card rounded-2xl border border-white/5 shadow-2xl flex flex-col overflow-hidden h-full min-h-[500px]">
                <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                    <h3 class="font-bold text-lg">All Student Grievances</h3>
                    <div class="flex gap-4">
                        <select id="adminFilter" class="bg-black/20 border border-white/10 rounded-lg px-4 py-2 text-sm text-white focus:outline-none appearance-none">
                            <option value="All">All Categories</option>
                            <option value="Academic">Academic</option>
                            <option value="Hostel">Hostel</option>
                            <option value="Infrastructure">Infrastructure</option>
                            <option value="Maintenance">Maintenance</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-slate-900/95 backdrop-blur-md shadow-sm">
                            <tr>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">ID</th>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">Student</th>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">Title</th>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">Category</th>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">Status</th>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminDashboardList" class="divide-y divide-white/5">
                            <!-- Injected by script.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Assignment Modal -->
    <div id="adminModal" class="hidden absolute inset-0 z-50 bg-[#0B0F19]/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-lg bg-slate-900 rounded-2xl border border-slate-700 shadow-2xl overflow-hidden animate-fade-in-up">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="font-bold text-lg"><span class="text-emerald-400">Assign</span> Grievance</h3>
                <button onclick="closeAdminModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-times h-5 w-5"></i></button>
            </div>
            
            <div class="p-6 space-y-5">
                <div class="flex justify-between">
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Grievance ID</p>
                        <p id="modalId" class="font-mono text-indigo-400 font-bold">--</p>
                    </div>
                    <div id="modalStatusBadge"></div>
                </div>
                
                <div>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Title</p>
                    <p id="modalTitle" class="text-slate-200">--</p>
                </div>
                
                <div>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Full Description</p>
                    <p id="modalDesc" class="text-sm text-slate-400 bg-white/5 p-4 rounded-xl border border-white/5 mt-1">--</p>
                </div>

                <div class="pt-4 border-t border-white/10">
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Assign to Department:</label>
                    <select id="modalDeptSelect" class="w-full mt-2 bg-slate-800 border border-emerald-500/30 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 appearance-none font-bold">
                        <option value="" disabled selected>Select Department...</option>
                        <option value="Academic">Academic</option>
                        <option value="Hostel">Hostel</option>
                        <option value="Infrastructure">Infrastructure</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                </div>
            </div>

            <div class="p-6 border-t border-white/5 bg-slate-900 flex justify-end gap-3">
                <button onclick="closeAdminModal()" class="px-6 py-2 bg-white/5 hover:bg-white/10 rounded-lg font-bold text-sm transition-colors text-slate-300">Cancel</button>
                <button id="modalAssignBtn" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg font-bold text-sm transition-colors shadow-lg active:scale-95 text-white">Save Assignment</button>
            </div>
        </div>
    </div>

    <script src="../assets/script.js"></script>
</body>
</html>
