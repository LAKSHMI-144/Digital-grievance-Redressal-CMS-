<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | GrievanceHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden bg-slate-950">
    <div class="absolute top-[30%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[50vw] h-[50vw] rounded-full bg-emerald-600/10 blur-[120px] animate-blob mix-blend-screen"></div>

    <div class="glass-card border-emerald-500/20 w-full max-w-md p-10 rounded-3xl relative z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
                <i class="fa-solid fa-shield-halved text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold">Admin Secure Login</h1>
            <p class="text-slate-400 text-sm mt-2">Central Management Portal</p>
        </div>

        <form id="adminLoginForm" class="space-y-5">
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Admin Email</label>
                <input type="email" id="email" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 transition-colors" placeholder="admin@university.edu">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Secure Password</label>
                <input type="password" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 transition-colors" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-emerald-500/30 active:scale-95 mt-4">Access Dashboard</button>
        </form>

        <div class="mt-8 text-center pt-6">
            <a href="../index.html" class="inline-block text-xs text-emerald-400 hover:text-emerald-300">Return Home</a>
        </div>
    </div>

    <script src="../assets/script.js"></script>
    <script>
        handleLogin('adminLoginForm', 'admin', 'admin-dashboard.html');
    </script>
</body>
</html>
