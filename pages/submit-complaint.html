<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Complaint | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="bg-slate-900 text-white font-inter min-h-screen flex flex-col selection:bg-indigo-500/30">
    <nav class="p-6">
        <a href="student-dashboard.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm font-medium">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="formContainer" class="glass-card w-full max-w-2xl p-8 md:p-10 rounded-3xl animate-fade-in-up">
            <h2 class="text-3xl font-bold mb-2">File a New Grievance</h2>
            <p class="text-slate-400 text-sm mb-8">Please provide as much detail as possible to help us resolve this quickly.</p>

            <form id="submitComplaintForm" class="space-y-6">
                <div>
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Category</label>
                    <select id="category" class="w-full mt-1 bg-slate-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500/50 appearance-none cursor-pointer">
                        <option value="Academic">📚 Academic Issue</option>
                        <option value="Hostel">🛏️ Hostel/Accommodation</option>
                        <option value="Infrastructure">🏢 Campus Infrastructure</option>
                        <option value="Maintenance">🔧 Maintenance</option>
                        <option value="Other">❓ Other</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Title</label>
                    <input type="text" id="title" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50" placeholder="Brief summary of the issue">
                </div>

                <div>
                    <div class="flex justify-between items-end mb-1 mt-1">
                        <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Description</label>
                        <button type="button" id="aiImproveBtn" class="text-xs flex items-center gap-1 bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500/30 px-3 py-1.5 rounded-lg border border-indigo-500/30 transition-colors font-bold"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Enhance</button>
                    </div>
                    <textarea id="description" required rows="4" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 resize-none" placeholder="Provide detailed information..."></textarea>
                    
                    <!-- AI Suggestion Box -->
                    <div id="aiSuggestionBox" class="hidden mt-3 p-4 bg-indigo-900/40 border border-indigo-500/30 rounded-xl relative overflow-hidden">
                        <div class="absolute inset-0 bg-indigo-500/10 animate-pulse pointer-events-none"></div>
                        <div class="flex items-center gap-2 mb-2 text-indigo-300 text-sm font-bold relative z-10">
                            <i class="fa-solid fa-robot"></i> AI Suggestion:
                        </div>
                        <p id="aiSuggestedText" class="text-sm text-slate-300 italic mb-3 relative z-10"></p>
                        <button type="button" id="applyAiText" class="text-xs bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1.5 rounded-lg transition-colors font-bold relative z-10">Apply Suggestion</button>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Evidence (Optional Image)</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full mt-1 border-2 border-dashed border-white/20 hover:border-indigo-500/50 rounded-xl p-4 text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-500/20 file:text-indigo-400 hover:file:bg-indigo-500/30 transition-all">
                    <img id="imagePreview" src="" alt="Preview" class="hidden mt-4 w-32 h-32 object-cover rounded-xl border border-white/10">
                </div>

                <button type="submit" class="btn-primary w-full mt-4">Submit Grievance to Database</button>
            </form>
        </div>

        <div id="successState" class="hidden text-center glass-card p-10 rounded-3xl animate-fade-in flex flex-col items-center max-w-md w-full">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mb-6">
                <i class="fa-solid fa-check text-4xl text-green-400"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">Submitted Successfully</h3>
            <p class="text-slate-400 text-sm mb-6">Your grievance has been stored and is pending assignment.</p>
            <div class="px-6 py-4 bg-white/5 rounded-xl border border-white/10 mb-8 w-full">
                <span class="text-xs text-slate-500 uppercase tracking-wider block mb-1">Your ID</span>
                <span id="displayId" class="text-xl font-mono text-indigo-400 font-bold"></span>
            </div>
            <a href="student-dashboard.html" class="btn-primary w-full text-center block">Back to Dashboard</a>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
