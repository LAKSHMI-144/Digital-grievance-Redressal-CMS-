<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration | GrievanceHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-x-hidden bg-slate-950 text-white">
    <!-- Background Elements -->
    <div class="absolute top-[10%] left-[20%] w-[30vw] h-[30vw] rounded-full bg-indigo-600/20 blur-[100px] animate-blob mix-blend-screen"></div>
    <div class="absolute bottom-[20%] right-[10%] w-[40vw] h-[40vw] rounded-full bg-purple-600/20 blur-[100px] animate-blob mix-blend-screen animation-delay-2000"></div>

    <div class="glass-card w-full max-w-md p-10 rounded-3xl relative z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-user-plus text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold">Create Account</h1>
            <p class="text-slate-400 text-sm mt-2">Register to submit grievances</p>
        </div>

        <form id="studentRegisterForm" class="space-y-5">
            <div id="registerError" class="hidden text-red-400 text-sm font-semibold text-center bg-red-500/10 border border-red-500/20 p-3 rounded-xl mb-4">
                <i class="fa-solid fa-circle-exclamation mr-1"></i> <span id="registerErrorMsg">Error</span>
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Full Name</label>
                <input type="text" id="name" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition-colors" placeholder="John Doe">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Student ID</label>
                <input type="text" id="studentId" required pattern="4MC23CS(00[1-9]|0[1-9][0-9]|1[0-9]{2}|200)" title="Format: 4MC23CS001 to 4MC23CS200" class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition-colors uppercase" placeholder="e.g. 4MC23CS073">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Password</label>
                <input type="password" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition-colors" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition-all shadow-lg shadow-blue-600/20 active:scale-[0.98] mt-4">Register Now</button>
        </form>

        <div class="mt-8 text-center border-t border-white/10 pt-6">
            <p class="text-xs text-slate-400 mb-4">Already have an account?</p>
            <a href="student-login.html" class="block w-full text-center px-6 py-2 bg-white/5 border border-white/10 hover:bg-white/10 rounded-lg text-sm font-bold transition-colors">Login Here</a>
            <a href="../index.html" class="inline-block mt-4 text-xs text-indigo-400 hover:text-indigo-300">Return Home</a>
        </div>
    </div>

    <script src="../assets/script.js"></script>
    <script>
        document.getElementById('studentRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const origHTML = btn.innerHTML;
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Registering...`;
            btn.disabled = true;
            
            const errorDiv = document.getElementById('registerError');
            errorDiv.classList.add('hidden');

            const name = document.getElementById('name').value;
            const studentId = document.getElementById('studentId').value;
            const passwordElement = e.target.querySelector('input[type="password"]');
            const password = passwordElement ? passwordElement.value : '';

            try {
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, studentId, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    document.getElementById('registerErrorMsg').innerText = data.error || 'Registration failed';
                    errorDiv.classList.remove('hidden');
                } else {
                    alert("Registration successful! Please login.");
                    window.location.href = 'student-login.html';
                }
            } catch (err) {
                document.getElementById('registerErrorMsg').innerText = "Network error. Is the server running?";
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = origHTML;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
