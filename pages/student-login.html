<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | GrievanceHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- Background Elements -->
    <div class="absolute top-[10%] left-[20%] w-[30vw] h-[30vw] rounded-full bg-indigo-600/20 blur-[100px] animate-blob mix-blend-screen"></div>
    <div class="absolute bottom-[20%] right-[10%] w-[40vw] h-[40vw] rounded-full bg-purple-600/20 blur-[100px] animate-blob mix-blend-screen animation-delay-2000"></div>

    <div class="glass-card w-full max-w-md p-10 rounded-3xl relative z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-user-graduate text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold">Student Portal</h1>
            <p class="text-slate-400 text-sm mt-2">Log in to submit and track grievances</p>
        </div>

        <form id="studentLoginForm" class="space-y-5">
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">University Email</label>
                <input type="email" id="email" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition-colors" placeholder="student@university.edu">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Password</label>
                <input type="password" required class="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition-colors" placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-primary w-full mt-4">Secure Login</button>
        </form>

        <div class="mt-8 text-center border-t border-white/10 pt-6">
            <p class="text-xs text-slate-400 mb-4">Don't have an account?</p>
            <a href="student-register.html" class="block w-full text-center px-6 py-2 glass-panel hover:bg-white/10 rounded-lg text-sm font-bold transition-colors">Register Account</a>
            <a href="../index.html" class="inline-block mt-4 text-xs text-indigo-400 hover:text-indigo-300">Return Home</a>
        </div>
    </div>

    <script src="../assets/script.js"></script>
    <script>
        handleLogin('studentLoginForm', 'student', 'student-dashboard.html');
    </script>
</body>
</html>
